    <header>
      <article class="logo">
        <object
          type="image/svg+xml"
          data="../logos-20260406T084312Z-1-001/logos/circle.svg"
          alt="Circle"
        ></object>
      </article>
      <article>
        <nav>

      <article>
        <a class="contact" href="ContactUs.html">Contact Us</a>
      </article>
    </header>
    <main>
      <h1>Contact Us</h1>
      <section class="complete-newsletter">
        <form action="#" method="post">
          <div>
            <label for="name">Full Name *</label>
            <input type="name" placeholder="Enter your full name" />
          </div>
          <div class="email-and-phone">
            <div>
              <label for="email">Email</label>
              <input type="email" id="email-input" placeholder="Enter your email address" />
            </div>
            <div>
              <label for="tel">Phone</label>
              <input type="tel" placeholder="phone" />
            </div>
          </div>
          <div>
            <label for="message">Message</label>
            <textarea
              type="message"
              rows="5"
              placeholder="Write your message here ...."
            ></textarea>
          </div>
          <button type="submit" id="btn-subscribe">Submit</button>
        </form>
      </section>
    </main>
    <footer>
      <section>
        <object
          type="image/svg+xml"
          data="../logos-20260406T084312Z-1-001/logos/circle.svg"
          alt="Circle"
        ></object>
        <p>292 Westheimer Rd. Santa Ana,<br />Illinois 85486</p>
      </section>
      <ul>
        <li>Team</li>
        <li>Services</li>
        <li>About Us</li>
        <li>Press</li>
